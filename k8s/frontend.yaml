apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopwave-frontend
  namespace: shopwave
  labels:
    app: shopwave-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopwave-frontend
  template:
    metadata:
      labels:
        app: shopwave-frontend
    spec:
      containers:
        - name: frontend
          image: shopwave-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: shopwave-frontend
  namespace: shopwave
spec:
  selector:
    app: shopwave-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP