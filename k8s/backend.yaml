apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopwave-backend
  namespace: shopwave
  labels:
    app: shopwave-backend
    version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopwave-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: shopwave-backend
    spec:
      containers:
        - name: backend
          image: shopwave-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/shopwave_db
            - name: DB_USERNAME
              value: shopwave
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopwave-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopwave-secrets
                  key: jwt-secret
            - name: CORS_ORIGINS
              value: "http://shopwave-frontend,http://localhost:3000"
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: shopwave-backend
  namespace: shopwave
spec:
  selector:
    app: shopwave-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shopwave-backend-hpa
  namespace: shopwave
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopwave-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80