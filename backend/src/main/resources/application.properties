# ═══════════════════════════════════════════════════════════════
#  ShopWave Backend — Production Config
#  ALL secrets come from environment variables. No fallback defaults.
# ═══════════════════════════════════════════════════════════════
spring.application.name=shopwave-backend
server.port=${PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# Database (env vars only — NO hardcoded credentials)
spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/shopwave_db}
spring.datasource.username=${DB_USERNAME:shopwave}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000

# JPA — validate only; Flyway handles schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT — NO fallback default
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}

# Springdoc / Swagger
spring.cache.type=simple
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Logging
logging.level.com.shopwave=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN