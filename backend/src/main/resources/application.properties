# ShopWave Backend - Render Production Config
spring.application.name=shopwave-backend

server.port=${PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# Database
spring.datasource.url=jdbc:postgresql://dpg-d7iba87avr4c73fi3b1g-a:5432/shopwave_db_baak?sslmode=require
spring.datasource.username=shopwave_db_baak_user
spring.datasource.password=6UeYe6Dy5yP7ECcKBkqcS4GkjVnQKR0C
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - adjusted for Render free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:shopwave-super-secret-jwt-key-change-in-production-2026}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# CORS
cors.allowed-origins=https://skumrender.onrender.com,http://localhost:5500,http://localhost:3000,http://127.0.0.1:5500

# Cache, Docs, Actuator
spring.cache.type=simple
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Logging - quieter in prod
logging.level.com.shopwave=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
spring.sql.init.mode=always