spring.application.name=shopwave-backend

server.port=${PORT:8080}
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

spring.datasource.url=jdbc:postgresql://dpg-d7iba87avr4c73fi3b1g-a.singapore-postgres.render.com:5432/shopwave_db_baak
spring.datasource.username=shopwave_db_baak_user
spring.datasource.password=6UeYe6Dy5yP7ECcKBkqcS4GkjVnQKR0C
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
