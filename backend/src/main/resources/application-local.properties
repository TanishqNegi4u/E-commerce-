# Local dev overrides — gitignored, NEVER committed (see .gitignore)
# Copy this file and fill in real values; do NOT commit secrets.
spring.datasource.url=jdbc:postgresql://localhost:5432/shopwave_db
spring.datasource.username=shopwave
# IMP-7 FIX: No fallback for JWT_SECRET. Must be set explicitly via env var.
# Generate: export JWT_SECRET=$(openssl rand -hex 32)
# The old fallback "please-set-JWT_SECRET-env-var-min-32-chars!!" was 44 chars
# and silently passed the 32-byte validation check, risking accidental use of
# a known-public weak secret. Now it fails fast if not set.
spring.datasource.password=${DB_PASSWORD:shopwave_local_dev}
spring.jpa.hibernate.ddl-auto=validate
jwt.secret=${JWT_SECRET}
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
logging.level.com.shopwave=DEBUG