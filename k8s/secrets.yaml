# ⚠️  DO NOT COMMIT WITH REAL VALUES
# Use: kubectl create secret generic shopwave-secrets \
#        --from-literal=db-password=YOUR_PASSWORD \
#        --from-literal=jwt-secret=YOUR_JWT_SECRET \
#        -n shopwave
apiVersion: v1
kind: Secret
metadata:
  name: shopwave-secrets
  namespace: shopwave
type: Opaque
stringData:
  db-password: "REPLACE_WITH_REAL_PASSWORD"
  jwt-secret: "REPLACE_WITH_64_CHAR_RANDOM_STRING"